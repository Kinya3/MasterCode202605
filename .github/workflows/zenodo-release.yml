name: Manual Generate Zenodo JSON with Links
# 設計者の意志で「今だ」という瞬間に実行するため、手動起動に限定します
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Process Metadata and Workflows Files
        id: process_data
        run: |
          # 1. Description (Root) の処理: 改行コード除去とトリミング
          if [ -f "zenodo_description.html" ]; then
            CLEAN_DESC=$(cat zenodo_description.html | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          else
            CLEAN_DESC="原本工学（Master-Code Engineering）体系：READフェーズ（第１～１４論文）の統合データセット。"
          fi
          echo "description<<EOF" >> $GITHUB_ENV
          echo "$CLEAN_DESC" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # 2. Keywords (Root) の処理: JSON配列化
          if [ -f "zenodo_keywords.txt" ]; then
            KEYWORDS_JSON=$(cat zenodo_keywords.txt | tr -d '\r' | grep -v '^$' | jq -R . | jq -s -c .)
          else
            KEYWORDS_JSON='["Master-Code Engineering", "原本工学"]'
          fi
          echo "keywords=$KEYWORDS_JSON" >> $GITHUB_ENV

          # 3. Links (.github/workflows/) の処理: 関連識別子の構築 [1]
          # フォーマット: "DOI 関係性" (例: 10.5281/zenodo.18166708 isDescribedBy)
          LINKS_FILE=".github/workflows/zenodo_links.txt"
          if [ -f "$LINKS_FILE" ]; then
            LINKS_JSON=$(cat "$LINKS_FILE" | tr -d '\r' | grep -v '^$' | while read -r id rel; do
              # 識別子と関係性をJSONオブジェクトにマッピング。resource_typeは標準的なpublication-articleをデフォルトに設定
              echo "{\"identifier\":\"$id\", \"relation\":\"$rel\", \"resource_type\":\"publication-article\"}"
            done | jq -s -c .)
          else
            LINKS_JSON='[]'
          fi
          echo "related_identifiers=$LINKS_JSON" >> $GITHUB_ENV

      - name: Build .zenodo.json in Root
        run: |
          # ヒアドキュメントにより、既存の .zenodo.json を最新の定義で上書き（新規作成）します
          cat <<EOF > .zenodo.json
          {
            "title": "原本工学（Master-Code Engineering）体系：READフェーズ（第１～１４論文）",
            "description": $(echo "$description" | jq -aR . | jq -s . | tr -d '\n'),
            "upload_type": "publication",
            "publication_type": "article",
            "access_right": "open",
            "license": "cc-by-nc-nd-4.0",
            "creators": [
              {
                "name": "響：無名の知の冒険",
                "affiliation": "原本校閲局 (Archetype Editorial Bureau)"
              }
            ],
            "keywords": ${{ env.keywords }},
            "related_identifiers": ${{ env.related_identifiers }}
          }
          EOF

      - name: Validate and Commit
        run: |
          # 生成されたJSONが正しいか構文チェック
          jq . .zenodo.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .zenodo.json
          # 変更がある場合のみコミットし、原本ログをリポジトリのルートに確定（Write）させます
          git commit -m "Manual refresh of .zenodo.json with dynamic links" || echo "No changes detected."
          git push origin main
          
