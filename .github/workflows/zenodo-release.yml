name: Prepare Zenodo JSON on Release

on:
  release:
    types: [published, edited]

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .zenodo.json from files
        run: |
          # =========================================================
          # 1. 基本設定（ご自身の情報に書き換えてください）
          # =========================================================
          TITLE="原本工学 (MCE)シリーズ論文 平和の実装"
          CREATORS='[{"name": "：田中 欽也（Tanaka Kinya）", "affiliation": "MirandaWorks株式会社"}]'
          LICENSE="cc-by-nc-nd-4.0"
          UPLOAD_TYPE="publication"
          PUBLICATION_TYPE="preprint"
          NOTES="翻訳の網目による情報の劣化を避けるため、解釈に相違が生じた場合は日本文の記述を原本（正）とする。"

          # =========================================================
          # 2. workflowsフォルダ内の各ファイルからデータを読み込み
          # =========================================================
          DESCRIPTION=$(jq -Rs . < .github/workflows/zenodo_description.html)
          KEYWORDS=$(jq -R . < .github/workflows/zenodo_keywords.txt | jq -s .)
          RELATED_IDENTIFIERS="[]"

          # =========================================================
          # 3. リポジトリ内（一時エリア）に .zenodo.json を出力
          # =========================================================
          jq -n \
            --arg title "$TITLE" \
            --argjson creators "$CREATORS" \
            --arg license "$LICENSE" \
            --arg upload_type "$UPLOAD_TYPE" \
            --arg publication_type "$PUBLICATION_TYPE" \
            --arg notes "$NOTES" \
            --argjson description "$DESCRIPTION" \
            --argjson keywords "$KEYWORDS" \
            --argjson related_identifiers "$RELATED_IDENTIFIERS" \
            '{
              title: $title, 
              creators: $creators, 
              license: $license, 
              upload_type: $upload_type, 
              publication_type: $publication_type, 
              notes: $notes, 
              description: $description, 
              keywords: $keywords,
              related_identifiers: $related_identifiers
            }' > .zenodo.json








