name: Prepare Zenodo JSON on Release

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate .zenodo.json from files
        run: |
          TITLE="原本工学 (MCE)シリーズ論文 平和の実装"
          
          # =========================================================
          # ★【修正①】著者名を正式な形式に直しました（全角コロンを排除）
          # =========================================================
          CREATORS='[{"name": "テスト, ○○の太郎", "affiliation": "〇〇大学"}]'
          
          LICENSE="cc-by-nc-nd-4.0"
          UPLOAD_TYPE="publication"
          PUBLICATION_TYPE="preprint"
          ACCESS_RIGHT_TYPE="restricted"
          ACCESS_CONDITIONS_TYPE="Access to these files is restricted to researchers who fill out the request form and state a valid research purpose."
          COMMUNITIES_TYPE=""

          # =========================================================
          # ★【修正②】今日の日付（例: 2026-05-27）を自動で取得してセットします
          # =========================================================
          PUB_DATE=$(date +'%Y-%m-%d')

          DESCRIPTION=$(tr -d '\r' < .github/workflows/zenodo_description.html | jq -Rs .)
          NOTES=$(tr -d '\r' < .github/workflows/zenodo_notes.html | jq -Rs .)
          KEYWORDS=$(tr -d '\r' < .github/workflows/zenodo_keywords.txt | jq -R . | jq -s .)
          RELATED_IDENTIFIERS="[]"

          # ルートフォルダに正確な .zenodo.json を出力
          jq -n \
            --arg title "$TITLE" \
            --argjson creators "$CREATORS" \
            --arg license "$LICENSE" \
            --arg upload_type "$UPLOAD_TYPE" \
            --arg publication_type "$PUBLICATION_TYPE" \
            --arg publication_date "$PUB_DATE" \
            
            --arg access_right "$ACCESS_RIGHT_TYPE" \
            --arg access_conditions "$ACCESS_CONDITIONS_TYPE" \
            --arg communities "$COMMUNITIES_TYPE" \

            --argjson notes "$NOTES" \
            --argjson description "$DESCRIPTION" \
            --argjson keywords "$KEYWORDS" \
            --argjson related_identifiers "$RELATED_IDENTIFIERS" \
            '{
              title: $title, 
              creators: $creators, 
              license: $license, 
              upload_type: $upload_type, 
              publication_type: $publication_type, 
              publication_date: $publication_date, 
              notes: $notes, 
              description: $description, 
              keywords: $keywords,
              related_identifiers: $related_identifiers
            }' > .zenodo.json

      - name: Commit and Push .zenodo.json to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add .zenodo.json
          git commit -m "chore: auto-generate .zenodo.json [skip ci]" || exit 0
          git push origin HEAD:main
